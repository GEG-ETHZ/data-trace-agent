# Prompt registry — maps agent names to the .md files that compose their system instruction.
# Files are concatenated in the order listed (system first, then tasks). Add new
# agents or prompts here.
#
# Usage:
#   - Add a .md file to prompts/system/ or prompts/tasks/
#   - Register it under the relevant agent below
#   - Run `make dev` to verify the agent uses the updated prompt

agents:
  root_agent:
    system:
      - system/base.md
      - system/safety.md
    tasks:
      - tasks/root_agent.md

  metadata_agent:
    system:
      - system/base.md
      - system/safety.md
    tasks:
      - tasks/metadata.md

  code_analysis_agent:
    system:
      - system/base.md
      - system/safety.md
    tasks:
      - tasks/code_analysis.md

  data_analysis_agent:
    system:
      - system/base.md
      - system/safety.md
    tasks:
      - tasks/data_analysis.md

  bigquery_agent:
    system:
      - system/base.md
      - system/safety.md
    tasks:
      - tasks/bigquery.md
